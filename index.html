<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Array Processor</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #4da6ff; --border: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        h2 { margin: 0; font-size: 1.2rem; color: var(--accent); font-weight: 500; }
        textarea { width: 100%; height: 180px; background: var(--panel); color: #a5d6a7; border: 1px solid var(--border); border-radius: 4px; padding: 12px; font-family: 'Consolas', monospace; resize: vertical; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); }
        th, td { border-bottom: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 0.85rem; }
        th { background: #252525; font-weight: 600; color: #aaa; }
        .status { padding: 3px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; }
        .status.match { background: #1b4d1b; color: #81c784; }
        .status.fail { background: #4d1b1b; color: #e57373; }
        input[type="text"] { background: transparent; color: var(--text); border: none; border-bottom: 1px solid #555; padding: 4px; width: 100%; font-family: monospace; font-size: 0.85rem; }
        input[type="text"]:focus { outline: none; border-bottom-color: var(--accent); }
        #statusMessage { font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h2>1. Ingestion</h2>
        <p style="font-size: 0.85rem; color: #aaa; margin-top: 4px;">Paste JSON output. Execution begins automatically on valid payload.</p>
        <textarea id="inputArea" spellcheck="false" placeholder='[ {"FullName": "C:\\Downloads\\Show.S01E01.mkv", "Name": "Show.S01E01.mkv", "Length": 1024} ]'></textarea>
    </div>

    <div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h2>2. Evaluation Matrix</h2>
            <span id="statusMessage">Awaiting input...</span>
        </div>
        <div style="max-height: 300px; overflow-y: auto; margin-top: 10px; border: 1px solid var(--border);">
            <table id="previewTable">
                <thead>
                    <tr>
                        <th>Source File</th>
                        <th>Resolution</th>
                        <th>Target Relative Path</th>
                        <th>State</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div>
        <h2>3. Output Script</h2>
        <textarea id="outputArea" readonly spellcheck="false" placeholder="Compiled PS1 syntax will output here and copy to clipboard..."></textarea>
    </div>
</div>

<script>
    const API_KEY = "8c1365e7271e2d6e613301939f928815";
    let debounceTimer;

    // Listen for paste/typing
    document.getElementById('inputArea').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const val = this.value.trim();
        if (!val) return;
        
        debounceTimer = setTimeout(() => {
            try {
                let files = JSON.parse(val);
                if (!Array.isArray(files)) files = [files];
                executePipeline(files);
            } catch (e) {
                document.getElementById('statusMessage').innerText = "Syntax error in JSON payload.";
                document.getElementById('statusMessage').style.color = "#e57373";
            }
        }, 600);
    });

    function parseFilename(filename) {
        let clean = filename.replace(/\.(1080p|720p|2160p|4k|x264|x265|bluray|hdtv|web-dl|hevc|rerip).*/i, '');
        clean = clean.replace(/[\.\_\-]/g, ' ');

        const tvMatch = clean.match(/(.+?)\s*S(\d{1,2})E(\d{1,2})/i);
        if (tvMatch) return { type: 'tv', title: tvMatch[1].trim(), season: parseInt(tvMatch[2]), episode: parseInt(tvMatch[3]) };

        const movieMatch = clean.match(/(.+?)\s*(\d{4})/);
        if (movieMatch) return { type: 'movie', title: movieMatch[1].trim(), year: movieMatch[2] };

        return { type: 'unknown', title: clean.trim() };
    }

    async function fetchMetadata(info) {
        const baseUrl = "https://api.themoviedb.org/3/search";
        try {
            let url = info.type === 'movie' 
                ? `${baseUrl}/movie?api_key=${API_KEY}&query=${encodeURIComponent(info.title)}&year=${info.year || ''}`
                : `${baseUrl}/tv?api_key=${API_KEY}&query=${encodeURIComponent(info.title)}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                const res = data.results[0];
                return {
                    officialTitle: (res.title || res.name).replace(/[<>:"/\\|?*]+/g, ''), // Sanitize for Windows FS
                    year: (res.release_date || res.first_air_date || "0000").split('-')[0],
                    success: true
                };
            }
        } catch (e) {}
        return { officialTitle: info.title, success: false };
    }

    async function executePipeline(files) {
        const tbody = document.getElementById('tableBody');
        const statusMsg = document.getElementById('statusMessage');
        const outputArea = document.getElementById('outputArea');
        
        statusMsg.innerText = "Processing metadata via TMDB...";
        statusMsg.style.color = "#4da6ff";
        tbody.innerHTML = "";
        
        let scriptLines = [
            "# Media Directory Synchronization",
            "$ErrorActionPreference = 'Stop'",
            "$TargetLibrary = 'D:\\Media' # UPDATE THIS TO YOUR DRIVE ROOT\n"
        ];

        for (let file of files) {
            if (!file.Name || !file.FullName) continue;
            
            const parsed = parseFilename(file.Name);
            const meta = await fetchMetadata(parsed);
            const ext = file.Name.split('.').pop();
            
            let targetPath = "";
            if (parsed.type === 'tv') {
                let s = parsed.season.toString().padStart(2, '0');
                let e = parsed.episode.toString().padStart(2, '0');
                targetPath = `TV Shows\\${meta.officialTitle}\\Season ${s}\\${meta.officialTitle} - S${s}E${e}.${ext}`;
            } else {
                targetPath = `Movies\\${meta.officialTitle} (${meta.year})\\${meta.officialTitle} (${meta.year}).${ext}`;
            }

            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${file.Name}</td>
                <td>${meta.officialTitle}</td>
                <td><input type="text" value="${targetPath}"></td>
                <td><span class="status ${meta.success ? 'match' : 'fail'}">${meta.success ? 'OK' : 'ERR'}</span></td>
            `;

            if (meta.success) {
                scriptLines.push(`$Dest = Join-Path -Path $TargetLibrary -ChildPath "${targetPath}"`);
                scriptLines.push(`New-Item -ItemType Directory -Force -Path (Split-Path $Dest) | Out-Null`);
                scriptLines.push(`Move-Item -Path "${file.FullName}" -Destination $Dest -WhatIf\n`);
            } else {
                scriptLines.push(`# [UNRESOLVED] Move-Item -Path "${file.FullName}" -Destination "???"\n`);
            }
        }

        const finalScript = scriptLines.join('\n');
        outputArea.value = finalScript;
        
        // Auto-copy to clipboard
        navigator.clipboard.writeText(finalScript).then(() => {
            statusMsg.innerText = "Complete. Script copied to clipboard.";
            statusMsg.style.color = "#81c784";
        }).catch(err => {
            statusMsg.innerText = "Complete. (Manual copy required)";
        });
    }
</script>

</body>
</html>
